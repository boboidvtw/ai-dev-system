<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Engineer Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --card-bg: rgba(255, 255, 255, 0.03);
            --accent: #00f7ff;
            --secondary: #9d50bb;
            --text-main: #e0e0e0;
            --text-dim: #888;
            --success: #00ff88;
            --error: #ff4444;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background: rgba(0,0,0,0.3);
            border-right: 1px solid var(--border);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(45deg, var(--accent), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .nav-section h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 1rem;
            letter-spacing: 1px;
        }

        .issue-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .issue-item {
            padding: 0.75rem;
            background: var(--card-bg);
            border: 1px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .issue-item:hover {
            border-color: var(--accent);
            background: rgba(0, 247, 255, 0.05);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 2rem;
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 2rem;
            overflow-y: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-run {
            background: linear-gradient(45deg, var(--accent), var(--secondary));
            border: none;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 99px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn-run:hover { transform: scale(1.05); opacity: 0.9; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        .panel {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .panel h2 { font-size: 1.1rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }

        /* Log Viewer */
        .log-viewer {
            flex: 1;
            background: #000;
            border-radius: 8px;
            padding: 1rem;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            overflow-y: auto;
            min-height: 400px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .log-entry { margin-bottom: 0.25rem; }
        .log-entry.info { color: #888; }
        .log-entry.success { color: var(--success); }
        .log-entry.error { color: var(--error); }

        /* Pipeline Steps */
        .steps {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .step {
            display: flex;
            align-items: center;
            gap: 1rem;
            opacity: 0.3;
            transition: opacity 0.3s;
        }

        .step.active { opacity: 1; color: var(--accent); }
        .step.done { opacity: 1; color: var(--success); }

        .step-num {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 1px solid currentColor;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: bold;
        }

        /* Glass Input */
        .glass-input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem;
            color: white;
            outline: none;
            margin-bottom: 1rem;
        }

        .glass-input:focus { border-color: var(--accent); }

    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">ANTIGRAVITY AI</div>
        
        <div class="nav-section">
            <h3>Open Issues</h3>
            <ul class="issue-list" id="issueList">
                <li class="issue-item">Loading issues...</li>
            </ul>
        </div>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Engineering Dashboard</h1>
            <div id="statusBadge" style="font-size: 0.8rem; color: var(--text-dim);">Ready</div>
        </div>

        <div class="dashboard-grid">
            <div class="panel">
                <h2><span>📡</span> Live Pipeline</h2>
                <input type="text" id="taskInput" class="glass-input" placeholder="What should I build today?">
                <input type="text" id="fileInput" class="glass-input" placeholder="Target file (e.g. app.py)">
                <button class="btn-run" onclick="startTask()">Launch AI Engineer</button>
                <div class="log-viewer" id="logViewer">
                    <div class="log-entry info">> Awaiting deployment instructions...</div>
                </div>
            </div>

            <div class="panel">
                <h2><span>🏗️</span> Progress</h2>
                <div class="steps">
                    <div class="step" id="step1"><div class="step-num">1</div> Problem Understanding</div>
                    <div class="step" id="step2"><div class="step-num">2</div> Solution Design</div>
                    <div class="step" id="step3"><div class="step-num">3</div> Implementation</div>
                    <div class="step" id="step4"><div class="step-num">4</div> Automated Testing</div>
                    <div class="step" id="step5"><div class="step-num">5</div> Optimization Review</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function fetchIssues() {
            try {
                const res = await fetch('/api/issues');
                const issues = await res.json();
                const list = document.getElementById('issueList');
                list.innerHTML = issues.map(i => `
                    <li class="issue-item" onclick="selectIssue(${i[0]}, '${i[1].replace(/'/g, "\\'")}')">
                        #${i[0]} ${i[1]}
                    </li>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        }

        function selectIssue(id, title) {
            document.getElementById('taskInput').value = `#${id} ${title}`;
            document.getElementById('fileInput').focus();
        }

        async function startTask() {
            const task = document.getElementById('taskInput').value;
            const file = document.getElementById('fileInput').value;
            if (!task || !file) return alert('Please provide task and file!');

            const res = await fetch('/api/run', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ task, target_file: file })
            });
            
            pollStatus();
        }

        let pollInterval;
        async function pollStatus() {
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(async () => {
                const res = await fetch('/api/status');
                const state = await res.json();
                
                // Update logs
                const logViewer = document.getElementById('logViewer');
                logViewer.innerHTML = state.logs.map(l => `<div class="log-entry info">> ${l}</div>`).join('');
                logViewer.scrollTop = logViewer.scrollHeight;

                // Update status
                document.getElementById('statusBadge').innerText = state.status.toUpperCase();
                
                if (state.status === 'success' || state.status === 'error') {
                    clearInterval(pollInterval);
                }
            }, 1000);
        }

        fetchIssues();
    </script>
</body>
</html>
